name: Sleep reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call notifications check endpoint
        run: |
          curl -sf -X POST "${{ secrets.BACKEND_URL }}/internal/notifications/check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
